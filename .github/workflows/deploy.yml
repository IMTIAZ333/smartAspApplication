name: Deploy ASP.NET Core to SmartASP.NET

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: windows-latest

    steps:

    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore Packages
      run: dotnet restore smartAspApplication/smartAspApplication.csproj

    - name: Build Project
      run: dotnet build smartAspApplication/smartAspApplication.csproj --configuration Release --no-restore

    - name: Publish Project
      run: dotnet publish smartAspApplication/smartAspApplication.csproj -c Release -o ./publish --no-build

    - name: Deploy to SmartASP.NET
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.DEPLOY_SITE }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish
