name: Deploy ASP.NET Core to SmartASP.NET
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore smartAspApplication.sln

    - name: Build
      run: dotnet build smartAspApplication.sln --configuration Release --no-restore

    - name: Publish
      run: dotnet publish smartAspApplication/smartAspApplication.csproj -c Release -o ./publish --no-build

    - name: Deploy to SmartASP.NET via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: win1143.site4now.net
        username: imtiaz300-001
        password: ${{ secrets.SMARTASP_FTP_PASSWORD }}
        local-dir: ./publish/
        server-dir: /marbalmountain/