name: Deploy ASP.NET Core to SmartASP.NET
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore smartAspApplication.sln

    - name: Build
      run: dotnet build smartAspApplication.sln --configuration Release --no-restore

    - name: Publish
      run: dotnet publish smartAspApplication/smartAspApplication.csproj -c Release -o ./publish --no-build

    - name: Deploy to SmartASP.NET via Web Deploy
      run: |
        & "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" `
          -verb:sync `
          -source:contentPath="./publish" `
          -dest:contentPath="imtiaz300-001-site1",computerName="https://win1143.site4now.net:8172/msdeploy.axd?site=imtiaz300-001-site1",userName="imtiaz300-001",password="${{ secrets.SMARTASP_MSDEPLOY_PASSWORD }}",authtype="Basic" `
          -allowUntrusted
      shell: powershellin/